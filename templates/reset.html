<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/theme.js"></script>
</head>
<body class="auth-page">

<div class="auth-card">
    <h1>Reset Password</h1>
    <p class="hint" id="reset-intro">Enter a new password below.</p>

    <div id="reset-form-wrapper">
        <label for="new-password">New password</label>
        <div class="field-row">
            <input id="new-password" type="password" placeholder="At least 8 characters">
            <button type="button" class="eye closed" onclick="togglePassword('new-password', this)"></button>
        </div>

        <label for="new-password-confirm">Confirm new password</label>
        <div class="field-row">
            <input id="new-password-confirm" type="password" placeholder="Type it again">
            <button type="button" class="eye closed" onclick="togglePassword('new-password-confirm', this)"></button>
        </div>

        <div class="modal-actions">
            <button id="submit-reset-btn">Set New Password</button>
        </div>

        <p id="reset-msg"></p>
    </div>

    <div id="reset-success" class="hidden">
        <p class="success-msg">Your password has been updated.</p>
        <p><a href="/">Click here to log in.</a></p>
    </div>
</div>

<script src="/static/public.js"></script>
<script src="/static/reset.js"></script>
</body>
</html>
